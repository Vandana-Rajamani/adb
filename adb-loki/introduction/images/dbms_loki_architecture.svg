<text x="593" y="302" text-anchor="middle" font-family="Oracle Sans, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="600" fill="#312D2A">Customer DBA</text>
<text x="593" y="318" text-anchor="middle" font-family="Oracle Sans, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#8B8880">SQL Worksheet / SQLcl</text>

